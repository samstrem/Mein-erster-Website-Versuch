</head>
<body>

<nav class="navbar" id="navbar">
    <a href="index.html" class="nav-logo">
        <img src="src/Logo.png" alt="SS">
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#skills">Skills</a></li>
        <li><a href="cv.html">CV</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<div class="contact-wrap">
    <h1 class="contact-heading">Schreib<br>mir!</h1>
    <p class="contact-sub">Ich freue mich über Career Opportunities, allgemeine Anfragen oder Feedback. Ich melde mich so schnell wie möglich.</p>

    <form action="https://formspree.io/f/xgodneov" method="POST" id="contact_form">
        <div class="form-field">
            <label for="anrede">Anrede</label>
            <select id="anrede" name="Anrede">
                <option value="">— bitte wählen —</option>
                <option value="Herr">Herr</option>
                <option value="Frau">Frau</option>
                <option value="Divers">Divers</option>
            </select>
        </div>
        <div class="form-field">
            <label for="contact-name">Name</label>
            <input id="contact-name" type="text" name="Name" placeholder="Max Mustermann" maxlength="100"/>
        </div>
        <div class="form-field">
            <label for="contact-email">E-Mail</label>
            <input id="contact-email" type="email" name="Email" placeholder="max@beispiel.at" maxlength="150"/>
        </div>
        <div class="form-field">
            <label for="reason">Anliegen</label>
            <select id="reason" name="reason">
                <option value="Job">Career Opportunity</option>
                <option value="Question">General Inquiry</option>
                <option value="Rating">Feedback</option>
                <option value="else">Other</option>
            </select>
        </div>
        <div class="form-field">
            <label for="message">Nachricht</label>
            <textarea id="message" name="Message" placeholder="Deine Nachricht an Samuel …" maxlength="2000"></textarea>
        </div>
        <button type="submit">Absenden</button>
    </form>
</div>

<script src="Website.js"></script>
</body>
</html>
